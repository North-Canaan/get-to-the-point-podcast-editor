<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="robots" content="noindex, nofollow" />
    <title>Private Highlight Review | Get To The Point</title>
    <link rel="stylesheet" href="/assets/styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="toolbar" aria-labelledby="review-title">
        <div class="review-heading">
          <div>
            <p class="eyebrow">Podcast editor</p>
            <h1 id="review-title">Preparing your episode</h1>
            <p id="episode-title" class="episode-title"></p>
          </div>
          <a class="button secondary" href="/">Choose another episode</a>
        </div>
        <div id="manual-controls" hidden>
        <form id="new-job-form">
          <label for="episode-url">Podcast URL</label>
          <input id="episode-url" name="episode-url" type="url" placeholder="https://..." />
          <button class="button" type="submit">Create job</button>
        </form>
        <div>
          <label for="job-id">Job ID</label>
          <input id="job-id" name="job-id" placeholder="Paste a job id or use /jobs/{id}/review" />
          <button class="button secondary" id="load-job" type="button">Load job</button>
        </div>
        </div>
        <div class="processing-state" id="processing-state">
          <span class="spinner" aria-hidden="true"></span>
          <div>
            <strong id="status">Loading episode…</strong>
            <p id="status-detail">This page will update automatically.</p>
          </div>
        </div>
      </section>
      <div class="audio-wrap" id="audio-wrap" hidden>
        <audio id="audio" controls preload="metadata"></audio>
      </div>
      <section class="role-bar" id="role-bar" aria-label="Speaker roles" hidden></section>
      <section class="highlight-list" id="highlight-list" aria-label="Highlight candidates" hidden></section>
      <div class="actions" id="produce-actions" hidden>
        <button class="button" id="produce" disabled type="button">Produce edit</button>
        <a class="button secondary" id="output-link" hidden>Open output</a>
      </div>
      <pre id="produce-log" style="white-space: pre-wrap"></pre>
    </main>
    <script type="module">
      import { FFmpeg } from "https://unpkg.com/@ffmpeg/ffmpeg@0.12.15/dist/esm/index.js";
      import { toBlobURL } from "https://unpkg.com/@ffmpeg/util@0.12.2/dist/esm/index.js";

      const state = {
        jobId: "",
        roles: {},
        highlights: [],
        decisions: new Map(),
        stopTimer: null,
        pollTimer: null
      };

      const statusEl = document.querySelector("#status");
      const statusDetail = document.querySelector("#status-detail");
      const processingState = document.querySelector("#processing-state");
      const episodeTitle = document.querySelector("#episode-title");
      const audioWrap = document.querySelector("#audio-wrap");
      const produceActions = document.querySelector("#produce-actions");
      const roleBar = document.querySelector("#role-bar");
      const list = document.querySelector("#highlight-list");
      const audio = document.querySelector("#audio");
      const produce = document.querySelector("#produce");
      const outputLink = document.querySelector("#output-link");
      const produceLog = document.querySelector("#produce-log");
      const PADDING_SECONDS = 0.3;
      const FADE_SECONDS = 0.02;

      const pathMatch = location.pathname.match(/\/jobs\/([^/]+)\/review/);
      const requestedJobId = pathMatch?.[1] || new URLSearchParams(location.search).get("job_id");
      if (requestedJobId) {
        document.querySelector("#job-id").value = requestedJobId;
        loadJob(requestedJobId);
      } else {
        document.querySelector("#manual-controls").hidden = false;
        document.querySelector("#review-title").textContent = "Load an editing job";
        setStatus("No job loaded.", "Choose an episode from the podcast library first.");
      }

      document.querySelector("#new-job-form").addEventListener("submit", async (event) => {
        event.preventDefault();
        const url = document.querySelector("#episode-url").value.trim();
        if (!url) return;
        setStatus("Creating job...");
        const response = await fetch("/jobs", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ url })
        });
        const payload = await response.json();
        if (!response.ok) {
          setStatus("Could not create job.", payload.detail || "Please try again.", "error");
          return;
        }
        document.querySelector("#job-id").value = payload.job_id;
        history.replaceState(null, "", `/jobs/${payload.job_id}/review`);
        loadJob(payload.job_id);
      });

      document.querySelector("#load-job").addEventListener("click", () => {
        const jobId = document.querySelector("#job-id").value.trim();
        if (jobId) loadJob(jobId);
      });

      produce.addEventListener("click", async () => {
        try {
          produce.disabled = true;
          produceLog.textContent = "";
          const approved = state.highlights
            .filter((item) => state.decisions.get(item.id)?.decision === "approve")
            .map((item) => {
              const decision = state.decisions.get(item.id);
              return { start: Number(decision.start), end: Number(decision.end) };
            });
          setStatus("Saving review decisions...");
          const response = await fetch(`/jobs/${state.jobId}/review`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ ordered_segments: approved })
          });
          if (!response.ok) {
            setStatus("Could not submit review.");
            syncProduce();
            return;
          }
          setStatus("Producing edit in this browser...");
          const blob = await spliceInBrowser(`/jobs/${state.jobId}/audio`, approved);
          setStatus("Uploading output...");
          const form = new FormData();
          form.append("file", blob, "output.mp3");
          const upload = await fetch(`/jobs/${state.jobId}/output`, {
            method: "POST",
            body: form
          });
          if (!upload.ok) {
            throw new Error(`Output upload failed: ${upload.status}`);
          }
          outputLink.href = `/jobs/${state.jobId}/output`;
          outputLink.hidden = false;
          setStatus("Done. Output is ready.");
        } catch (error) {
          console.error(error);
          appendProduceLog(`ERROR: ${error && error.stack ? error.stack : error}`);
          setStatus("Produce failed. See log below.");
        } finally {
          syncProduce();
        }
      });

      async function loadJob(jobId) {
        state.jobId = jobId;
        window.clearTimeout(state.pollTimer);
        outputLink.hidden = true;
        setStatus("Loading episode…", "Checking the processing status.");
        const response = await fetch(`/jobs/${jobId}/state`);
        if (!response.ok) {
          if (response.status === 404) {
            setStatus("Job not found.", "Return to the podcast library and choose the episode again.", "error");
          } else {
            setStatus("Could not load this job.", "A temporary server error occurred. Retrying automatically…", "error");
            state.pollTimer = window.setTimeout(() => loadJob(jobId), 10000);
          }
          return;
        }
        const payload = await response.json();
        if (payload.episode_title) episodeTitle.textContent = payload.episode_title;
        renderJobStatus(payload);
        if (["queued", "transcribing", "detecting_highlights"].includes(payload.status)) {
          state.pollTimer = window.setTimeout(() => loadJob(jobId), 10000);
        }
        if (!payload.highlights) {
          roleBar.innerHTML = "";
          list.innerHTML = "";
          return;
        }
        audio.src = `/jobs/${jobId}/audio`;
        audioWrap.hidden = false;
        roleBar.hidden = false;
        list.hidden = false;
        produceActions.hidden = false;
        processingState.classList.add("ready");
        document.querySelector("#review-title").textContent = "Review suggested highlights";
        state.roles = payload.highlights.roles || {};
        state.highlights = [...payload.highlights.highlights].sort((a, b) => b.score - a.score);
        state.decisions.clear();
        state.highlights.forEach((item) => {
          state.decisions.set(item.id, {
            decision: "",
            start: item.start,
            end: item.end
          });
        });
        renderRoles();
        renderHighlights();
        syncProduce();
      }

      function renderJobStatus(payload) {
        const messages = {
          queued: ["Starting episode…", "Submitting the audio for transcription."],
          transcribing: ["Transcribing the episode…", "Hebrew transcription and speaker detection can take several minutes."],
          detecting_highlights: ["Finding the strongest moments…", "The transcript is ready and highlight suggestions are being created."],
          needs_review: ["Highlights are ready.", "Approve, reject, reorder, or adjust the suggested clips below."],
          splicing: ["Edit saved.", "The final audio is being prepared in this browser."],
          done: ["Your edited episode is ready.", "Open or download the finished MP3."],
          error: ["We could not process this episode.", payload.error || "Please choose the episode again or try another feed."]
        };
        const message = messages[payload.status] || ["Processing episode…", "This page will update automatically."];
        setStatus(message[0], message[1], payload.status === "error" ? "error" : "");
        if (payload.status === "done") {
          outputLink.href = `/jobs/${state.jobId}/output`;
          outputLink.hidden = false;
          produceActions.hidden = false;
          processingState.classList.add("ready");
        }
      }

      function renderRoles() {
        roleBar.innerHTML = "";
        Object.entries(state.roles).forEach(([speaker, role]) => {
          const wrapper = document.createElement("label");
          wrapper.className = "role-control";
          wrapper.textContent = speaker;
          const select = document.createElement("select");
          ["host", "guest", "other"].forEach((value) => {
            const option = document.createElement("option");
            option.value = value;
            option.textContent = value;
            option.selected = value === role;
            select.append(option);
          });
          select.addEventListener("change", () => {
            state.roles[speaker] = select.value;
            renderHighlights();
          });
          wrapper.append(select);
          roleBar.append(wrapper);
        });
      }

      function renderHighlights() {
        list.innerHTML = "";
        state.highlights.forEach((item) => {
          const decision = state.decisions.get(item.id);
          const row = document.createElement("article");
          row.className = "highlight-row";
          row.innerHTML = `
            <div>
              <div class="highlight-meta">
                <span>${formatTime(item.start)}-${formatTime(item.end)}</span>
                <span>${item.speaker} (${state.roles[item.speaker] || "other"})</span>
                <span>Score ${item.score}</span>
              </div>
              <p class="reason">${escapeHtml(item.reason)}</p>
              <p class="highlight-text">${escapeHtml(item.text || "")}</p>
            </div>
          `;
          const actions = document.createElement("div");
          actions.className = "row-actions";
          const play = document.createElement("button");
          play.className = "button secondary";
          play.type = "button";
          play.textContent = "Play";
          play.addEventListener("click", () => playSegment(Number(decision.start), Number(decision.end)));

          const toggles = document.createElement("div");
          toggles.className = "toggle-group";
          const approve = toggleButton("Approve", "approve", item.id);
          const reject = toggleButton("Reject", "reject", item.id);
          toggles.append(approve, reject);

          const nudge = document.createElement("div");
          nudge.className = "nudge";
          const start = numberInput(decision.start, (value) => {
            decision.start = value;
          });
          const end = numberInput(decision.end, (value) => {
            decision.end = value;
          });
          nudge.append(start, end);
          actions.append(play, toggles, nudge);
          row.append(actions);
          list.append(row);
        });
      }

      function toggleButton(label, value, id) {
        const button = document.createElement("button");
        button.type = "button";
        button.textContent = label;
        button.className = `${value} ${state.decisions.get(id).decision === value ? "active" : ""}`;
        button.addEventListener("click", () => {
          const current = state.decisions.get(id);
          current.decision = current.decision === value ? "" : value;
          renderHighlights();
          syncProduce();
        });
        return button;
      }

      function numberInput(value, onChange) {
        const input = document.createElement("input");
        input.type = "number";
        input.step = "0.1";
        input.value = Number(value).toFixed(1);
        input.addEventListener("change", () => onChange(input.value));
        return input;
      }

      function playSegment(start, end) {
        window.clearTimeout(state.stopTimer);
        audio.currentTime = start;
        audio.play();
        state.stopTimer = window.setInterval(() => {
          if (audio.currentTime >= end) {
            audio.pause();
            window.clearInterval(state.stopTimer);
          }
        }, 80);
      }

      function syncProduce() {
        produce.disabled = ![...state.decisions.values()].some((item) => item.decision === "approve");
      }

      function setStatus(value, detail = "", tone = "") {
        statusEl.textContent = value;
        statusDetail.textContent = detail;
        processingState.classList.toggle("error", tone === "error");
      }

      function formatTime(seconds) {
        const total = Math.max(0, Math.floor(seconds));
        const minutes = Math.floor(total / 60);
        const rest = String(total % 60).padStart(2, "0");
        return `${minutes}:${rest}`;
      }

      function escapeHtml(value) {
        return String(value).replace(/[&<>"']/g, (char) => {
          return { "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#039;" }[char];
        });
      }

      async function spliceInBrowser(audioUrl, orderedSegments) {
        appendProduceLog("Loading ffmpeg.wasm...");
        const ffmpeg = new FFmpeg();
        ffmpeg.on("log", ({ message }) => appendProduceLog(message));
        ffmpeg.on("progress", ({ progress }) => {
          setStatus(`ffmpeg progress ${(progress * 100).toFixed(1)}%`);
        });

        const classWorkerURL = await moduleWorkerBlobURL(
          "https://unpkg.com/@ffmpeg/ffmpeg@0.12.15/dist/esm/worker.js"
        );
        const coreURL = await toBlobURL(
          "https://unpkg.com/@ffmpeg/core@0.12.10/dist/esm/ffmpeg-core.js",
          "text/javascript"
        );
        const wasmURL = await toBlobURL(
          "https://unpkg.com/@ffmpeg/core@0.12.10/dist/esm/ffmpeg-core.wasm",
          "application/wasm"
        );
        await ffmpeg.load({ classWorkerURL, coreURL, wasmURL });

        appendProduceLog("Downloading source audio...");
        const audioBytes = await fetchWithProgress(audioUrl, (loaded, total) => {
          const label = total
            ? `${formatBytes(loaded)} / ${formatBytes(total)}`
            : `${formatBytes(loaded)}`;
          setStatus(`Downloading source audio: ${label}`);
        });
        await ffmpeg.writeFile("input.mp3", audioBytes);

        const clipNames = [];
        for (const [index, segment] of orderedSegments.entries()) {
          const start = Math.max(0, Number(segment.start) - PADDING_SECONDS);
          const end = Number(segment.end) + PADDING_SECONDS;
          const duration = Math.max(0, end - start);
          const fadeOutStart = Math.max(0, duration - FADE_SECONDS);
          const name = `clip_${String(index).padStart(3, "0")}.mp3`;
          clipNames.push(name);
          setStatus(`Extracting clip ${index + 1}/${orderedSegments.length}...`);
          await ffmpeg.exec([
            "-ss",
            start.toFixed(3),
            "-to",
            end.toFixed(3),
            "-i",
            "input.mp3",
            "-af",
            `afade=t=in:st=0:d=${FADE_SECONDS},afade=t=out:st=${fadeOutStart.toFixed(3)}:d=${FADE_SECONDS}`,
            "-c:a",
            "libmp3lame",
            "-b:a",
            "128k",
            name
          ]);
        }

        await ffmpeg.writeFile(
          "concat.txt",
          new TextEncoder().encode(clipNames.map((name) => `file '${name}'`).join("\n") + "\n")
        );
        setStatus("Concatenating output...");
        await ffmpeg.exec([
          "-f",
          "concat",
          "-safe",
          "0",
          "-i",
          "concat.txt",
          "-c:a",
          "libmp3lame",
          "-b:a",
          "128k",
          "output.mp3"
        ]);
        const data = await ffmpeg.readFile("output.mp3");
        return new Blob([data.buffer], { type: "audio/mpeg" });
      }

      async function fetchWithProgress(url, onProgress) {
        const response = await fetch(url, { mode: "cors" });
        if (!response.ok) {
          throw new Error(`Audio fetch failed: ${response.status} ${response.statusText}`);
        }
        if (!response.body) {
          return new Uint8Array(await response.arrayBuffer());
        }
        const total = Number(response.headers.get("content-length") || 0);
        const reader = response.body.getReader();
        const chunks = [];
        let loaded = 0;
        while (true) {
          const { done, value } = await reader.read();
          if (done) break;
          chunks.push(value);
          loaded += value.byteLength;
          onProgress(loaded, total);
        }
        const output = new Uint8Array(loaded);
        let offset = 0;
        for (const chunk of chunks) {
          output.set(chunk, offset);
          offset += chunk.byteLength;
        }
        return output;
      }

      async function moduleWorkerBlobURL(url) {
        const response = await fetch(url, { mode: "cors" });
        if (!response.ok) {
          throw new Error(`Worker fetch failed: ${response.status} ${response.statusText}`);
        }
        const base = url.slice(0, url.lastIndexOf("/") + 1);
        const source = (await response.text()).replaceAll('from "./', `from "${base}`);
        return URL.createObjectURL(new Blob([source], { type: "text/javascript" }));
      }

      function appendProduceLog(value) {
        produceLog.textContent += `${value}\n`;
      }

      function formatBytes(value) {
        if (value < 1024 * 1024) return `${(value / 1024).toFixed(1)}KB`;
        return `${(value / (1024 * 1024)).toFixed(1)}MB`;
      }
    </script>
  </body>
</html>
